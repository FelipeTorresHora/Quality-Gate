<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura proposta para melhorar o harness de analise de Pull Request</title>
  <desc id="desc">Arquitetura recomendada com API leve, fila duravel, worker containerizado, sandbox de execucao, contrato de runner e estados terminais de job.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#58a6ff"/>
    </marker>
    <marker id="okArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3fb950"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#010409" flood-opacity="0.30"/>
    </filter>
    <style>
      .bg{fill:#0d1117}
      .title{font:700 38px Segoe UI,Arial,sans-serif;fill:#f0f6fc}
      .subtitle{font:400 18px Segoe UI,Arial,sans-serif;fill:#9da7b3}
      .section{font:700 16px Segoe UI,Arial,sans-serif;fill:#7d8590;letter-spacing:.08em}
      .box{fill:#161b22;stroke:#30363d;stroke-width:2;rx:14;filter:url(#shadow)}
      .boxBlue{fill:#12203a;stroke:#2f81f7;stroke-width:2;rx:14;filter:url(#shadow)}
      .boxGreen{fill:#0f2419;stroke:#3fb950;stroke-width:2;rx:14;filter:url(#shadow)}
      .boxCyan{fill:#092630;stroke:#39c5cf;stroke-width:2;rx:14;filter:url(#shadow)}
      .boxPurple{fill:#21162e;stroke:#a371f7;stroke-width:2;rx:14;filter:url(#shadow)}
      .boxYellow{fill:#241a08;stroke:#d29922;stroke-width:2;rx:14;filter:url(#shadow)}
      .inner{fill:#0d1117;stroke:#30363d;stroke-width:2;rx:12}
      .label{font:700 22px Segoe UI,Arial,sans-serif;fill:#f0f6fc}
      .body{font:400 16px Segoe UI,Arial,sans-serif;fill:#c9d1d9}
      .small{font:400 14px Segoe UI,Arial,sans-serif;fill:#9da7b3}
      .code{font:600 14px Consolas,Menlo,monospace;fill:#a5d6ff}
      .ok{font:700 15px Segoe UI,Arial,sans-serif;fill:#d2fedb}
      .okMuted{font:400 14px Segoe UI,Arial,sans-serif;fill:#b6f3c4}
      .line{stroke:#58a6ff;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .okLine{stroke:#3fb950;stroke-width:3;fill:none;marker-end:url(#okArrow)}
      .thin{stroke:#484f58;stroke-width:2;fill:none}
      .pill{fill:#21262d;stroke:#30363d;stroke-width:1;rx:16}
      .pillText{font:700 13px Segoe UI,Arial,sans-serif;fill:#d2a8ff}
      .check{fill:#3fb950}
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text class="title" x="70" y="72">Arquitetura melhorada - harness de analise de PR</text>
  <text class="subtitle" x="70" y="108">Separar captura, fila e execucao pesada; tornar o job recuperavel; esconder complexidade atras de um runner testavel.</text>

  <text class="section" x="70" y="164">PLANO DE CONTROLE LEVE</text>
  <rect class="boxBlue" x="70" y="190" width="295" height="150"/>
  <text class="label" x="100" y="232">Entradas</text>
  <text class="body" x="100" y="266">Webhook GitHub</text>
  <text class="body" x="100" y="293">Analise manual</text>
  <text class="small" x="100" y="322">somente captura contexto do PR</text>

  <rect class="boxBlue" x="440" y="190" width="320" height="150"/>
  <text class="label" x="470" y="232">API FastAPI</text>
  <text class="body" x="470" y="266">valida usuario/evento</text>
  <text class="body" x="470" y="293">cria/reusa AnalysisRun</text>
  <text class="small" x="470" y="322">nao executa comandos de repo</text>

  <rect class="boxGreen" x="835" y="190" width="340" height="150"/>
  <text class="label" x="865" y="232">Fila duravel</text>
  <text class="code" x="865" y="266">analysis_jobs</text>
  <text class="body" x="865" y="293">queued, leased, succeeded, failed</text>
  <text class="small" x="865" y="322">attempts + locked_until + error</text>

  <rect class="boxYellow" x="1250" y="190" width="280" height="150"/>
  <text class="label" x="1280" y="232">UI / GitHub status</text>
  <text class="body" x="1280" y="266">polling do run</text>
  <text class="body" x="1280" y="293">publicacao explicita</text>
  <text class="small" x="1280" y="322">sem bloquear execucao</text>

  <path class="line" d="M365 265 C395 265 410 265 440 265"/>
  <path class="line" d="M760 265 C795 265 805 265 835 265"/>
  <path class="line" d="M1175 265 C1210 265 1220 265 1250 265"/>

  <text class="section" x="70" y="406">PLANO DE EXECUCAO PESADO</text>
  <rect class="box" x="70" y="430" width="1460" height="360"/>

  <rect class="boxGreen" x="105" y="475" width="275" height="240"/>
  <text class="label" x="135" y="515">Worker container</text>
  <text class="body" x="135" y="550">servico sempre ativo</text>
  <text class="body" x="135" y="577">imagem com toolchain</text>
  <text class="small" x="135" y="606">git, node, npm, go, scanners</text>
  <text class="small" x="135" y="635">logs e metricas proprios</text>
  <text class="code" x="135" y="668">claim_job_with_lease()</text>

  <rect class="boxPurple" x="445" y="475" width="300" height="240"/>
  <text class="label" x="475" y="515">Analysis Orchestrator</text>
  <text class="body" x="475" y="550">gera token por job</text>
  <text class="body" x="475" y="577">controla deadline total</text>
  <text class="body" x="475" y="604">persiste resultados parciais</text>
  <text class="small" x="475" y="635">sempre finaliza run e job</text>
  <text class="code" x="475" y="668">execute(run_id, runner)</text>

  <rect class="boxCyan" x="810" y="475" width="310" height="240"/>
  <text class="label" x="840" y="515">Runner interface</text>
  <text class="body" x="840" y="550">checkout_once(head/base)</text>
  <text class="body" x="840" y="577">run_command(spec)</text>
  <text class="body" x="840" y="604">collect_artifacts()</text>
  <text class="small" x="840" y="635">contrato pequeno para testes</text>
  <text class="code" x="840" y="668">ContainerRunner | ActionsRunner</text>

  <rect class="boxCyan" x="1185" y="475" width="300" height="240"/>
  <text class="label" x="1215" y="515">Sandbox</text>
  <text class="body" x="1215" y="550">workspace gravavel</text>
  <text class="body" x="1215" y="577">env allowlist</text>
  <text class="body" x="1215" y="604">timeout por comando</text>
  <text class="body" x="1215" y="631">redacao de saida</text>
  <text class="small" x="1215" y="662">sem segredos da app</text>

  <path class="okLine" d="M1005 340 C1005 395 250 390 245 475"/>
  <path class="okLine" d="M380 595 C410 595 420 595 445 595"/>
  <path class="okLine" d="M745 595 C775 595 785 595 810 595"/>
  <path class="okLine" d="M1120 595 C1150 595 1160 595 1185 595"/>

  <rect class="inner" x="155" y="745" width="1280" height="2"/>
  <path class="okLine" d="M965 715 C965 760 640 805 600 840"/>
  <path class="okLine" d="M1335 715 C1335 800 1115 812 1010 840"/>

  <text class="section" x="70" y="840">RESULTADO ESPERADO</text>
  <rect class="boxGreen" x="70" y="865" width="360" height="72"/>
  <circle class="check" cx="105" cy="895" r="12"/>
  <text class="ok" x="128" y="894">API deixa de carregar o trabalho pesado</text>
  <text class="okMuted" x="128" y="918">timeouts HTTP deixam de matar a analise.</text>

  <rect class="boxGreen" x="470" y="865" width="360" height="72"/>
  <circle class="check" cx="505" cy="895" r="12"/>
  <text class="ok" x="528" y="894">Job recuperavel e observavel</text>
  <text class="okMuted" x="528" y="918">lease expira, retry acontece, dead-letter registra causa.</text>

  <rect class="boxGreen" x="870" y="865" width="360" height="72"/>
  <circle class="check" cx="905" cy="895" r="12"/>
  <text class="ok" x="928" y="894">Runner vira modulo profundo</text>
  <text class="okMuted" x="928" y="918">gates testam contra uma interface pequena.</text>

  <rect class="boxGreen" x="1270" y="865" width="260" height="72"/>
  <circle class="check" cx="1305" cy="895" r="12"/>
  <text class="ok" x="1328" y="894">Sandbox explicito</text>
  <text class="okMuted" x="1328" y="918">menos risco de RCE e vazamento.</text>
</svg>
