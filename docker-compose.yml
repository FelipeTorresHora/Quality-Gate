services:
  backend:
    build:
      context: ./backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000}"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-PR Quality Gate Dashboard}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://pr_quality:pr_quality@postgres:5432/pr_quality}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_API_VERSION: ${GITHUB_API_VERSION:-2022-11-28}
      GITHUB_DEFAULT_BASE_BRANCH: ${GITHUB_DEFAULT_BASE_BRANCH:-main}
      GITHUB_STATUS_CONTEXT: ${GITHUB_STATUS_CONTEXT:-ai-quality-gate}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-qg_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      AUTH_CALLBACK_URL: ${AUTH_CALLBACK_URL:-http://localhost:8000/api/auth/github/callback}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-pr-quality-dashboard}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pr_quality
      POSTGRES_USER: pr_quality
      POSTGRES_PASSWORD: pr_quality
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pr_quality -d pr_quality"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro

volumes:
  postgres_data:
